<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="script.js"></script>
    <style>
      body {
        font-family: "Gill Sans";
        background-color: #cdcdcd;
        padding: 16px;
      }
      h1 {
        color: rgb(2, 93, 96);
        text-align: center;
      }
      .input-area {
        text-align: center;
        margin-bottom: 20px;
      }
      #tarefaInput {
        width: 200px;
        padding: 8px;
      }
      #btnAdicionar {
        padding: 8px 12px;
        margin-left: 5px;
        background-color: rgb(2, 93, 96);
        color: white;
        border: #16c416 0px solid;
        border-radius: 8px;
        cursor: pointer;
      }
      #btnAdicionar:hover {
        background-color: rgb(58, 3, 94);
        color: white;
        transition: 0.5s;
      }
      ul {
        padding: 0px;
      }
      li {
        background-color: white;
        padding: 10px;
        margin: 16px 16px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-content: center;
      }

      li.concluida {
        text-decoration: line-through;
        color: gray;
      }

      .fechar {
        background-color: darkred;
        border-radius: 100px;
      }
    </style>
  </head>
  <body>
    <h1>Tarefas</h1>
    <div>
      <input
        type="text"
        id="tarefaInput"
        placeholder="Digite uma nova tarefa"
      />
      <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
      <li>Estudar</li>
    </ul>
  </body>
</html>
