<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Vue — atividade_todo_vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      body {
        margin: 0;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
        background-color: #e8e8e8;
        padding: 16px;
      }
      .todo-app {
        background-color: #cdcdcd;
        padding: 16px;
        margin: 24px auto;
        max-width: 520px;
        border-radius: 8px;
        text-align: left;
      }
      .todo-app h1 {
        color: rgb(2, 93, 96);
        text-align: center;
      }
      .todo-app .input-area {
        text-align: center;
        margin-bottom: 20px;
      }
      .todo-app .tarefa-input {
        width: 200px;
        padding: 8px;
      }
      .todo-app .btn-adicionar {
        padding: 8px 12px;
        margin-left: 5px;
        background-color: rgb(2, 93, 96);
        color: white;
        border: 0 solid #16c416;
        border-radius: 8px;
        cursor: pointer;
      }
      .todo-app .btn-adicionar:hover {
        background-color: rgb(58, 3, 94);
        color: white;
        transition: 0.5s;
      }
      .todo-app .lista-tarefas {
        list-style: none;
        padding: 0;
      }
      .todo-app .lista-tarefas li {
        background-color: white;
        padding: 10px;
        margin: 16px 16px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }
      .todo-app .lista-tarefas li.concluida .texto-tarefa {
        text-decoration: line-through;
        color: gray;
      }
      .todo-app .texto-tarefa {
        flex: 1;
        text-align: left;
      }
      .todo-app .fechar {
        background-color: darkred;
        color: white;
        border: none;
        border-radius: 100px;
        width: 28px;
        height: 28px;
        cursor: pointer;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            novaTarefa: "",
            proximoId: 2,
            tarefas: [{ id: 1, texto: "Estudar", concluida: false }],
          };
        },
        methods: {
          adicionarTarefa() {
            const texto = this.novaTarefa.trim();
            if (!texto) return;
            this.tarefas.push({
              id: this.proximoId++,
              texto,
              concluida: false,
            });
            this.novaTarefa = "";
          },
          alternarConcluida(tarefa) {
            tarefa.concluida = !tarefa.concluida;
          },
          removerTarefa(id) {
            this.tarefas = this.tarefas.filter((t) => t.id !== id);
          },
        },
        template: `
          <section class="todo-app">
            <h1>Tarefas</h1>
            <div class="input-area">
              <input
                v-model="novaTarefa"
                type="text"
                class="tarefa-input"
                placeholder="Digite uma nova tarefa"
                @keyup.enter="adicionarTarefa"
              />
              <button type="button" class="btn-adicionar" @click="adicionarTarefa">+</button>
            </div>
            <ul class="lista-tarefas">
              <li
                v-for="tarefa in tarefas"
                :key="tarefa.id"
                :class="{ concluida: tarefa.concluida }"
                @click="alternarConcluida(tarefa)"
              >
                <span class="texto-tarefa">{{ tarefa.texto }}</span>
                <button type="button" class="fechar" @click.stop="removerTarefa(tarefa.id)">x</button>
              </li>
            </ul>
          </section>
        `,
      }).mount("#app");
    </script>
  </body>
</html>
